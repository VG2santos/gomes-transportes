<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gomes Transportes</title>
</head>
<body>

<h2>Gomes Transportes</h2>

<form id="form">
<input type="date" name="data"><br>
<select name="caminhao">
<option>FDB-0A70</option>
<option>AOP-6E88</option>
</select><br>
<input name="cliente" placeholder="Cliente"><br>
<input name="destino" placeholder="Destino"><br>
<input name="valor_frete" placeholder="Frete"><br>
<input name="valor_recebido" placeholder="Recebido"><br>
<button>Salvar</button>
</form>

<script>
document.getElementById("form").addEventListener("submit", async e=>{
 e.preventDefault();
 const data = Object.fromEntries(new FormData(e.target));
 await fetch("/viagem",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
 alert("Salvo!");
});
</script>

</body>
</html>
